<!DOCTYPE html>
<html>

<head>

<title>For You ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

.container{
margin-top:60px;
}

img{
width:280px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

button{
font-size:18px;
padding:12px 22px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
}

#yesBtn{
background:#28a745;
color:white;
}

#noBtn{
background:#ff4d4d;
color:white;
position:absolute;
}

#message{
display:none;
padding:40px;
}

.heart{
position:fixed;
top:-10px;
color:red;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-10vh);
}

100%{
transform:translateY(110vh);
}

}

</style>

</head>

<body>

<div class="container" id="main">

<h1>Will you be my Valentine? ❤️</h1>

<img src="img.jpg">

<br><br>

<button id="yesBtn">Yes</button>
<button id="noBtn">No</button>

</div>

<div id="message">

<h1>အရမ်းချစ်တယ် ❤️</h1>

<h2 id="date"></h2>

<p id="letter" style="font-size:20px;max-width:600px;margin:auto;"></p>

</div>

<audio id="song" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

let yesSize = 18;

function moveNo(){

yesSize += 8;

yesBtn.style.fontSize = yesSize+"px";

noBtn.style.left=Math.random()*window.innerWidth+"px";
noBtn.style.top=Math.random()*window.innerHeight+"px";

}

noBtn.onmouseover = moveNo;
noBtn.ontouchstart = moveNo;

yesBtn.onclick=function(){

document.getElementById("song").play();

document.getElementById("main").style.display="none";

document.getElementById("message").style.display="block";

document.getElementById("date").innerHTML=new Date().toDateString();

typeLetter();

startHearts();

}

let text="From the moment you came into my life, everything became brighter. You are the happiness in my heart and the peace in my world.";

let i=0;

function typeLetter(){

if(i<text.length){

document.getElementById("letter").innerHTML+=text.charAt(i);

i++;

setTimeout(typeLetter,40);

}

}

function startHearts(){

setInterval(function(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(10+Math.random()*30)+"px";

heart.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

},300);

}

</script>

</body>
</html>
